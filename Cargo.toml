[package]
name = "mangoloader"
version = "0.0.1"
edition = "2021"

[dependencies]
axum = "0.7.5"
hyper = "1.4.1"
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
sqlx = "0.8.2"
tokio = { version = "1.40.0", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5.1", features = ["util"] }
tower-http = { version = "0.6.0", features = ["fs", "trace"] }
tracing = "0.1.40"
tracing-subscriber = "0.3.18"
